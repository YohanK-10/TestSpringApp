name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: atlaswatch_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d atlaswatch_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_DATABASE_URL: jdbc:postgresql://localhost:5432/atlaswatch_ci
      SPRING_DATABASE_USERNAME: postgres
      SPRING_DATABASE_PASSWORD: postgres
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      MAIL_HOST: localhost
      EMAIL: ci@example.com
      EMAIL_PASSWORD: dummy
      EXPIRATION_TIME_FOR_REFRESH_TOKEN: 86400000
      CLIENT_ID: dummy
      CLIENT_SECRET: dummy
      TMDB_API_TOKEN: dummy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests
        run: mvn test

  frontend-check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: moviehub-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: moviehub-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm exec tsc --noEmit